  <title>Programa Compras AMAMA</title>

  <style>
:root{
  --bg:#f6f7f8;
  --card:#ffffff;
  --ink:#111;
  --muted:#666;
  --bar:#075E54;
  --bar2:#128C7E;
  --accent:#00a884;
  --danger:#c62828;
  --warn:#f59e0b;
  --shadow: 0 10px 30px rgba(0,0,0,.10);
  --radius: 22px;
  --gap: 14px;
  --btnH: 96px;
  --btnH2: 132px;
  --font: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  -webkit-tap-highlight-color: transparent;
  user-select:none;
}

/* ================= HEADER GRANDE ================= */
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background: linear-gradient(180deg, var(--bar), var(--bar2));
  color:#fff;
  padding:18px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  box-shadow: 0 8px 18px rgba(0,0,0,.18);
}
.leftSlot,.centerSlot,.rightSlot{ display:flex; align-items:center; gap:12px; }
.centerSlot{ flex:1; justify-content:center; }

.headerBtn{
  border:0;
  color:#fff;
  background: rgba(255,255,255,.20);
  border:1px solid rgba(255,255,255,.30);
  height: 96px;
  min-width: 160px;
  border-radius: 22px;
  font-weight:1000;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 0 18px;
}
.headerBtn.hidden{ visibility:hidden; }

.smallIconBtn{
  border:0;
  color:#fff;
  background: rgba(255,255,255,.20);
  border:1px solid rgba(255,255,255,.30);
  width:96px;
  height:96px;
  border-radius:22px;
  font-weight:1000;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Botón “Categorías” como texto */
.title{
  font-weight:1000;
  font-size:22px;
  display:flex;
  align-items:center;
  gap:10px;
}
.titleBtn{
  border:0;
  background:transparent;
  color:#fff;
  font-weight:1000;
  font-size:22px;
  padding:0;
  margin:0;
  cursor:pointer;
}
.titleBtn:active{ opacity:.85; }

/* ================= CONTENIDO ================= */
.wrap{
  max-width:980px;
  margin:0 auto;
  padding:20px 16px 32px;
}
.grid{
  margin-top:10px;
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--gap);
}

/* ================= BOTONES PRINCIPALES ================= */
.bigbtn{
  position:relative;
  background: var(--card);
  border:0;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  height: var(--btnH);
  padding: 18px;
  display:flex;
  align-items:center;
  gap:14px;
  text-align:left;
  font-weight:1000;
  font-size: 24px;
}
.bigbtn.large{
  height: var(--btnH2);
  font-size: 28px;
}
.icon{
  width:60px;
  height:60px;
  border-radius:18px;
  display:grid;
  place-items:center;
  font-size:36px;
  background:#eef7f5;
  border:1px solid rgba(0,0,0,.06);
}
.subtxt{
  font-size:15px;
  font-weight:800;
  color:var(--muted);
  display:block;
  margin-top:4px;
}
.badge{
  position:absolute;
  right:14px;
  top:14px;
  min-width:46px;
  height:36px;
  padding:0 12px;
  border-radius:999px;
  background: var(--accent);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:1000;
  font-size:18px;
}

/* ================= MODAL ================= */
.modalMask{
  position:fixed;
  inset:0;
  background: rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding: 14px;
}
.modal{
  width:min(980px, 100%);
  background:#fff;
  border-radius:22px;
  box-shadow:0 30px 80px rgba(0,0,0,.30);
  max-height:92vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.modalHead{
  padding:20px;
  background:#f2f4f6;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(0,0,0,.08);
  font-size:22px;
  font-weight:1000;
}
.modalBody{
  padding:20px;
  overflow:auto;
  flex:1;
}
.modalFoot{
  padding:18px;
  border-top:1px solid rgba(0,0,0,.08);
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.action{
  flex:1;
  height:80px;
  border-radius:20px;
  border:0;
  background: var(--accent);
  color:#fff;
  font-weight:1000;
  font-size:20px;
}
.action.secondary{
  background:#fff;
  color:var(--ink);
  border:1px solid rgba(0,0,0,.12);
}
.action.danger{ background: var(--danger); }
.action:disabled{ opacity:.45; }

/* ================= LISTA / HISTORIAL ================= */
.rowItem{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:16px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,.10);
  margin-bottom:14px;
  background:#fff;
}
.rowName{
  font-weight:1000;
  font-size:22px;
  flex:1;
}
.rowControls{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.qty{
  font-weight:1000;
  background:#eef7f5;
  padding:12px 16px;
  border-radius:16px;
  font-size:20px;
  min-width: 64px;
  text-align:center;
}
.mini{
  border:1px solid rgba(0,0,0,.12);
  padding:14px 18px;
  border-radius:16px;
  font-weight:1000;
  background:#fff;
  font-size:18px;
}
.mini.danger{
  color:var(--danger);
  border-color: rgba(198,40,40,.45);
}
.adminCard{
  border:1px solid rgba(0,0,0,.10);
  border-radius:20px;
  background:#fff;
  padding:16px;
  margin-bottom:14px;
}
.split{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}
.muted{ color:#666; font-weight:800; }
.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background:#eef7f5;
  font-weight:1000;
  font-size:14px;
}
.warnBox{
  border:1px solid rgba(245,158,11,.45);
  background: rgba(245,158,11,.12);
  border-radius:20px;
  padding:14px;
  margin-bottom:14px;
  font-weight:1000;
}
.warnBox .small{
  margin-top:6px;
  color:#6b4e00;
  font-weight:900;
}

/* voz */
.voiceBox{
  border:1px solid rgba(0,0,0,.10);
  border-radius:20px;
  padding:16px;
  background:#fff;
}
.voiceBig{
  font-size:22px;
  font-weight:1000;
  margin:0;
}
.voiceSub{
  margin-top:8px;
  color:#666;
  font-weight:800;
}
.transcript{
  margin-top:12px;
  font-weight:1000;
  font-size:20px;
  padding:12px;
  border-radius:18px;
  background:#f6f7f8;
  border:1px solid rgba(0,0,0,.08);
}

/* inputs admin */
.input{
  width:100%;
  height:64px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.12);
  padding: 0 16px;
  font-weight:1000;
  font-size:18px;
  outline:none;
  background:#fff;
}
.select{
  width:100%;
  height:64px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.12);
  padding: 0 16px;
  font-weight:1000;
  font-size:18px;
  outline:none;
  background:#fff;
}
.priceRow{
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
}
.priceName{
  font-weight:1000;
  font-size:20px;
  flex: 1;
  min-width: 220px;
}
.priceInp{
  width: 160px;
  height:64px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.12);
  padding: 0 14px;
  font-weight:1000;
  font-size:20px;
  text-align:right;
}

/* ===== Orden (drag & drop) ===== */
.dragRow{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
}
.dragHandle{
  width:54px;
  height:54px;
  border-radius:16px;
  border:1px solid rgba(0,0,0,.10);
  display:grid;
  place-items:center;
  font-size:22px;
  background:#f7faf9;
  cursor:grab;
  flex: 0 0 auto;
}
.dragHandle:active{ cursor:grabbing; }
.dragMeta{
  flex:1;
  min-width: 220px;
}
.dragName{
  font-weight:1000;
  font-size:20px;
}
.dragCat{
  margin-top:4px;
  color:#666;
  font-weight:800;
}
.dragHint{
  font-weight:1000;
  color:#666;
  margin-top:10px;
}
.dragOver{
  outline: 3px dashed rgba(0,168,132,.55);
  outline-offset: 6px;
}

/* ================= TOAST ================= */
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform: translateX(-50%);
  background:#111;
  color:#fff;
  padding:18px 26px;
  border-radius:999px;
  font-weight:1000;
  font-size:20px;
  opacity:0;
  transition:opacity .2s ease;
  z-index: 50;
  pointer-events:none;
}
.toast.show{ opacity:1; }
  </style>
</head>

  // ---------- DOM ----------
  const el = (id) => document.getElementById(id);

  // ---------- State ----------
  let state = loadStateOrMigrate();

  // ---------- Storage ----------
  function loadStateOrMigrate(){
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return buildDefaultState();

    try{
      const parsed = JSON.parse(raw);

      const base = buildDefaultState();
      const normalized = normalizeLoaded(parsed, base);

      if(Number(normalized._catalogVersion) !== CATALOG_VERSION){
        // Migra manteniendo lo que interesa
        const keepUi = normalized.ui || {};
        const keepPurchases = Array.isArray(normalized.purchases) ? normalized.purchases : [];
        const keepList = normalized.list || {};
        const keepNotes = Array.isArray(normalized.pendingNotes) ? normalized.pendingNotes : [];
        const keepGlobalOrder = Array.isArray(normalized.globalOrder) ? normalized.globalOrder : [];

        const ns = buildDefaultState();
        ns.ui = { ...ns.ui, ...keepUi };
        ns.purchases = keepPurchases;
        ns.list = keepList;
        ns.pendingNotes = keepNotes;
        ns.globalOrder = keepGlobalOrder;
        ns._catalogVersion = CATALOG_VERSION;

        // Si venías de otro catálogo, respetamos el tuyo si existe
        if(Array.isArray(normalized.categories) && normalized.categories.length>0){
          ns.categories = normalized.categories;
        }

        return ns;
      }

      return normalized;
    }catch{
      return buildDefaultState();
    }
  }

  function normalizeLoaded(parsed, base){
    const merged = {
      ...structuredClone(base),
      ...parsed,
      ui: { ...structuredClone(base.ui), ...(parsed.ui||{}) },
      categories: Array.isArray(parsed.categories) ? parsed.categories : structuredClone(base.categories),
      globalOrder: Array.isArray(parsed.globalOrder) ? parsed.globalOrder : [],
      list: parsed.list || {},
      pendingNotes: Array.isArray(parsed.pendingNotes) ? parsed.pendingNotes : [],
      purchases: Array.isArray(parsed.purchases) ? parsed.purchases : [],
      _catalogVersion: Number(parsed._catalogVersion || 1)
    };

    for (const c of merged.categories) {
      if (typeof c.id !== "string") c.id = uuid();
      if (typeof c.name !== "string") c.name = "Categoría";
      if (typeof c.icon !== "string") c.icon = "📦";
      if (!c.size) c.size = "large";
      if (!Array.isArray(c.items)) c.items = [];
      for (const it of (c.items || [])) {
        if (typeof it.id !== "string") it.id = uuid();
        if (typeof it.name !== "string") it.name = "Producto";
        if (typeof it.important !== "boolean") it.important = false;
        if (!Number.isFinite(Number(it.price))) it.price = 0;
        if (typeof it.icon !== "string") it.icon = "";
      }
    }

    merged.pendingNotes = merged.pendingNotes
      .filter(n => n && typeof n.text === "string")
      .map(n => ({
        id: n.id || uuid(),
        text: n.text.trim(),
        qty: Number(n.qty) > 0 ? Number(n.qty) : 1,
        createdAt: n.createdAt || new Date().toISOString()
      }))
      .filter(n => n.text.length > 0);

    return merged;
  }

  function saveState(){
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    updateListPill();
  }

  function forceAllItemsNormal(){
    for(const c of state.categories){
      for(const it of (c.items||[])){
        if ("size" in it) delete it.size;
      }
    }
  }

  // ---------- Utils ----------
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function allProductsFlat(){
    const out=[];
    for(const c of state.categories){
      for(const it of (c.items||[])) out.push({category:c, product:it});
    }
    return out;
  }

  function findCategory(catId){
    return state.categories.find(c=>c.id===catId) || null;
  }

  function findProduct(productId){
    for(const c of state.categories){
      const item=(c.items||[]).find(x=>x.id===productId);
      if(item) return {category:c, item};
    }
    return null;
  }

  function ensureGlobalOrderIntegrity(){
    const allIds=new Set(allProductsFlat().map(x=>x.product.id));
    state.globalOrder=(state.globalOrder||[]).filter(id=>allIds.has(id));
    for(const id of allIds){
      if(!state.globalOrder.includes(id)) state.globalOrder.push(id);
    }
  }

  function resetGlobalOrderToCatalog(){
    const ids = [];
    for(const c of state.categories){
      for(const it of (c.items||[])) ids.push(it.id);
    }
    state.globalOrder = ids;
    ensureGlobalOrderIntegrity();
  }

  function removeProductEverywhere(productId){
    // 1) eliminar de lista
    if(state.list && state.list[productId] != null) delete state.list[productId];
    // 2) eliminar de globalOrder
    state.globalOrder = (state.globalOrder||[]).filter(id=>id!==productId);
    // 3) historial se queda con el nombre (no rompemos compras viejas)
  }

  function round2(n){ return Math.round((Number(n)||0)*100)/100; }
  function eur(n){ return (Number(n)||0).toFixed(2).replace(".",",")+" €"; }

  function norm(s){
    return String(s||"")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^\p{L}\p{N}\s]/gu, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function parsePriceInput(v){
    const s = String(v ?? "").trim().replace(",", ".");
    const num = Number(s);
    if(!Number.isFinite(num) || num < 0) return null;
    return round2(num);
  }

  function parseEmojiInput(v){
    // no validación dura: permitimos cualquier texto corto
    const s = String(v ?? "").trim();
    if(!s) return "";
    // recorta si alguien pega texto largo
    return s.slice(0, 6);
  }

  // ---------- Sound ----------
  let audioCtx=null;
  function ensureAudio(){
    if(!state.ui.soundEnabled) return null;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx=new AC();
    if(audioCtx.state==="suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  function softBeep(){
    const ctx=ensureAudio(); if(!ctx) return;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type="sine"; o.frequency.value=660;
    const now=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(0.06,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.08);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now+0.09);
  }

  // ---------- Toast ----------
  let toastTimer=null;
  function showToast(msg){
    toast.textContent=msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove("show"),1100);
  }

  // ---------- List pill ----------
  function getTotalListQty(){
    const productQty = Object.values(state.list).reduce((a,n)=>a+(Number(n)||0),0);
    const notesQty = (state.pendingNotes||[]).reduce((a,n)=>a+(Number(n.qty)||0),0);
    return productQty + notesQty;
  }
  function updateListPill(){
    btnOpenList.textContent=`LISTA (${getTotalListQty()})`;
  }
  function hasPendingNotes(){
    return Array.isArray(state.pendingNotes) && state.pendingNotes.length > 0;
  }

  // ---------- Layout ----------
  function applyColumns(){
    const cols=state.ui.homeColumns||2;
    const mq=window.matchMedia("(min-width: 900px)").matches;
    grid.style.gridTemplateColumns = (cols===3 && mq) ? "repeat(3, minmax(0, 1fr))" : "repeat(2, minmax(0, 1fr))";

  function makeButton({icon,title,subtitle,size,badgeQty,onClick}){
    const b=document.createElement("button");
    b.className="bigbtn "+(size==="large"?"large":"");
    b.innerHTML=`
      ${icon?`<span class="icon">${escapeHtml(icon)}</span>`:""}

      ${(badgeQty&&badgeQty>0)?`<span class="badge">${badgeQty}</span>`:""}

    b.addEventListener("click", onClick);
    return b;
  }

  // ---------- Render ----------
  function render(){
    applyColumns();
    grid.innerHTML="";

    if(view.screen==="home"){
      btnBack.classList.add("hidden");
      state.categories.forEach(cat=>{
        grid.appendChild(makeButton({
          icon:cat.icon||"📦",
          title:cat.name,
          subtitle:`${cat.items?.length||0} artículos`,
          size:cat.size||"large",
          onClick:()=>{ view={screen:"category", categoryId:cat.id}; render(); }
        }));
      });
      return;
    }

    if(view.screen==="category"){
      btnBack.classList.remove("hidden");
      const cat=state.categories.find(c=>c.id===view.categoryId);
      if(!cat){ view={screen:"home",categoryId:null}; return render(); }

      const itemsSorted=[...(cat.items||[])].sort((a,b)=>{
        const ai=a.important?1:0, bi=b.important?1:0;
        if(ai!==bi) return bi-ai;
        return (a.name||"").localeCompare((b.name||""), "es", {sensitivity:"base"});
      });

      itemsSorted.forEach(item=>{
        const qty=Number(state.list[item.id]||0);
        const isImp=!!item.important;
        const emoji = (item.icon||"").trim();
        grid.appendChild(makeButton({
          icon: emoji,
          title:(isImp?"⭐ ":"")+item.name,
          subtitle:isImp?"Importante · Tocar para añadir (+1)":"Tocar para añadir (+1)",
          size:"normal",
          badgeQty:qty,
          onClick:()=>addToList(item.id,1)
        }));
      });
    }
  }

  // ---------- List ops (productos) ----------
  function addToList(productId, delta){
    const current=Number(state.list[productId]||0);
    const next=current+delta;
    if(next<=0) delete state.list[productId];
    else state.list[productId]=next;

    saveState();
    softBeep();
    showToast(delta>0?"✅ Añadido a la lista":"➖ Quitado");
    render();
  }
  function removeFromList(productId){
    delete state.list[productId];
    saveState();
    render();
  }

  // ---------- Notes ops ----------
  function addNote(text, qty=1){
    const clean = String(text||"").trim();
    if(!clean) return;
    state.pendingNotes.unshift({
      id: uuid(),
      text: clean,
      qty: Number(qty)>0 ? Number(qty) : 1,
      createdAt: new Date().toISOString()
    });
    saveState();
  }
  function incNote(noteId, delta){
    const n = state.pendingNotes.find(x=>x.id===noteId);
    if(!n) return;
    const next = (Number(n.qty)||1) + delta;
    if(next<=0){
      state.pendingNotes = state.pendingNotes.filter(x=>x.id!==noteId);
    }else{
      n.qty = next;
    }
    saveState();
  }
  function deleteNote(noteId){
    state.pendingNotes = state.pendingNotes.filter(x=>x.id!==noteId);
    saveState();
  }

  // ---------- Modal helpers ----------
  function openModal(title, bodyHtml, footHtml=""){
    modalTitle.textContent=title;
    modalBody.innerHTML=bodyHtml;

    if(footHtml){
      modalFoot.style.display="flex";
      modalFoot.innerHTML=footHtml;
    }else{
      modalFoot.style.display="none";
      modalFoot.innerHTML="";
    }

    modalMask.style.display="flex";
    modalMask.setAttribute("aria-hidden","false");
  }
  function closeModal(){
    stopVoiceIfAny();
    modalMask.style.display="none";
    modalMask.setAttribute("aria-hidden","true");
    modalBody.innerHTML="";
    modalFoot.innerHTML="";
    modalFoot.style.display="none";
  }
  modalClose.addEventListener("click", closeModal);
  modalMask.addEventListener("click", (e)=>{ if(e.target===modalMask) closeModal(); });

  function isModalOpen(){
    return modalMask && getComputedStyle(modalMask).display !== "none";
  }

  // ---------- List view ----------
  function buildOrderedProductItems(){
    ensureGlobalOrderIntegrity();

    const items=[];
    for(const pid of state.globalOrder){
      const qty=Number(state.list[pid]||0);
      if(qty<=0) continue;
      const found=findProduct(pid);
      if(!found) continue;
      items.push({productId:pid, name:found.item.name, qty});
    }
    for(const pid of Object.keys(state.list)){
      if(state.globalOrder.includes(pid)) continue;
      const qty=Number(state.list[pid]||0);
      if(qty<=0) continue;
      const found=findProduct(pid);
      if(!found) continue;
      items.push({productId:pid, name:found.item.name, qty});
    }
    return items;
  }

  function openList(){
    const notes = state.pendingNotes || [];
    const ordered = buildOrderedProductItems();
    const anyItems = (notes.length>0) || (ordered.length>0);

    if(!anyItems){
      openModal("🧾 Lista de la compra", `<p style="font-weight:1000;font-size:18px;margin:0;">La lista está vacía.</p>`, `
        <button class="action secondary" id="btnHistory">📚 Historial</button>
        <button class="action secondary" id="btnReviewNotes" disabled>📝 Revisar notas (0)</button>
        <button class="action secondary" id="btnCreatePurchase" disabled>🧾 Crear lista</button>
        <button class="action danger" id="btnConfirmBought" disabled>✅ Confirmar lista comprada</button>
      `);
      hookListFootButtons();
      return;
    }

    let html = "";

    if(notes.length>0){
      html += `
        <div class="warnBox">
          ⚠️ Hay <b>${notes.length}</b> nota(s) pendiente(s) por confirmar.
          <div class="small">No se puede crear/confirmar la compra hasta resolverlas.</div>
        </div>
      `;

      for(const n of notes){
        html += `
          <div class="rowItem">
            <div class="rowName">📝 ${escapeHtml(n.text)}</div>
            <div class="rowControls">
              <span class="qty">${Number(n.qty)||1}</span>
              <button class="mini" data-nact="minus" data-id="${escapeHtml(n.id)}">➖</button>
              <button class="mini" data-nact="plus" data-id="${escapeHtml(n.id)}">➕</button>
              <button class="mini danger" data-nact="del" data-id="${escapeHtml(n.id)}">🗑️</button>
            </div>
          </div>
        `;
      }
    }

    for(const it of ordered){
      html += `
        <div class="rowItem">
          <div class="rowName">${escapeHtml(it.name)}</div>
          <div class="rowControls">
            <span class="qty">${it.qty}</span>
            <button class="mini" data-act="minus" data-id="${escapeHtml(it.productId)}">➖</button>
            <button class="mini" data-act="plus" data-id="${escapeHtml(it.productId)}">➕</button>
            <button class="mini danger" data-act="del" data-id="${escapeHtml(it.productId)}">🗑️</button>
          </div>
        </div>
      `;
    }

    const disabled = notes.length > 0 ? "disabled" : "";
    const notesLabel = `📝 Revisar notas (${notes.length})`;

    openModal("🧾 Lista de la compra", html, `
      <button class="action secondary" id="btnHistory">📚 Historial</button>
      <button class="action secondary" id="btnReviewNotes" ${notes.length===0?"disabled":""}>${notesLabel}</button>
      <button class="action secondary" id="btnCreatePurchase" ${disabled}>🧾 Crear lista</button>
      <button class="action danger" id="btnConfirmBought" ${disabled}>✅ Confirmar lista comprada</button>
    `);

    // productos
    modalBody.querySelectorAll("button[data-act]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const act=btn.getAttribute("data-act");
        const pid=btn.getAttribute("data-id");
        if(!pid) return;

        if(act==="plus") addToList(pid,1);
        if(act==="minus") addToList(pid,-1);
        if(act==="del") removeFromList(pid);

        openList();
      });
    });

    // notas
    modalBody.querySelectorAll("button[data-nact]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const act=btn.getAttribute("data-nact");
        const id=btn.getAttribute("data-id");
        if(!id) return;

        if(act==="plus") incNote(id, 1);
        if(act==="minus") incNote(id, -1);
        if(act==="del"){
          if(confirm("¿Borrar esta nota?")){
            deleteNote(id);
          }
        }
        openList();
      });
    });

    hookListFootButtons();
  }

  function hookListFootButtons(){
    modalFoot.querySelector("#btnHistory")?.addEventListener("click", openHistory);
    modalFoot.querySelector("#btnReviewNotes")?.addEventListener("click", openReviewNotes);
    modalFoot.querySelector("#btnCreatePurchase")?.addEventListener("click", ()=>openPurchasePreview({mode:"create"}));
    modalFoot.querySelector("#btnConfirmBought")?.addEventListener("click", ()=>openPurchasePreview({mode:"confirmBought"}));
  }

  // ---------- Purchase ----------
  function calcPurchaseFromCurrentList(){
    const ordered=buildOrderedProductItems();
    const items=[];
    let knownTotal=0;
    let missingCount=0;

    for(const it of ordered){
      const found=findProduct(it.productId);
      if(!found) continue;
      const unitPrice=Number(found.item.price);
      const hasPrice=Number.isFinite(unitPrice)&&unitPrice>0;
      if(hasPrice) knownTotal+=unitPrice*it.qty;
      else missingCount+=1;
      items.push({ productId:it.productId, name:found.item.name, qty:it.qty, unitPrice: hasPrice?unitPrice:null });
    }
    return { items, totals:{ known: round2(knownTotal), missingCount } };
  }

  function openPurchasePreview({mode}){
    if(hasPendingNotes()){
      showToast("⚠️ Primero confirma las notas");
      openList();
      return;
    }

    const p=calcPurchaseFromCurrentList();
    if(p.items.length===0){ showToast("ℹ️ La lista está vacía"); return; }

    let lines="";
    for(const it of p.items){
      lines+=`
        <div class="rowItem">
          <div class="rowName">${escapeHtml(it.name)}</div>
          <div class="rowControls"><span class="qty">${it.qty}</span></div>
        </div>
      `;
    }

    const totalBlock=`
      <div style="margin-top:12px;padding:12px;border-radius:18px;border:1px solid rgba(0,0,0,.10);background:#f8fafb;">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
          <div style="font-weight:1000;font-size:18px;">Total estimado</div>
          <div style="font-weight:1000;font-size:18px;">${eur(p.totals.known)}</div>
        </div>
        ${p.totals.missingCount>0?`
          <div style="margin-top:6px;color:#666;font-weight:800;">
            Artículos sin precio: <b>${p.totals.missingCount}</b>
          </div>`:""}
      </div>
    `;

    const title = mode==="confirmBought" ? "✅ Confirmar lista comprada" : "🧾 Crear lista de compra";
    const confirmText = mode==="confirmBought" ? "✅ Sí, lista comprada" : "✅ Guardar lista";
    const confirmClass = mode==="confirmBought" ? "danger" : "";

    openModal(title, `
      <p style="margin:0 0 10px;font-weight:1000;font-size:16px;">
        ${mode==="confirmBought"
          ? "Esto guardará la compra en el historial y vaciará la lista actual."
          : "Esto guardará la lista en el historial (la lista actual NO se vacía)."}
      </p>
      ${lines}
      ${totalBlock}
    `, `
      <button class="action secondary" id="btnCancelPreview">❌ Cancelar</button>
      <button class="action ${confirmClass}" id="btnConfirmPreview">${confirmText}</button>
    `);

    modalFoot.querySelector("#btnCancelPreview")?.addEventListener("click", openList);

    modalFoot.querySelector("#btnConfirmPreview")?.addEventListener("click", ()=>{
      const purchase={
        id: uuid(),
        createdAt: new Date().toISOString(),
        status: mode==="confirmBought" ? "comprada" : "guardada",
        items: p.items.map(x=>({ productId:x.productId, name:x.name, qty:x.qty, unitPrice:x.unitPrice })),
        totals: p.totals
      };

      state.purchases.unshift(purchase);
      if(mode==="confirmBought") state.list={};

      saveState();
      showToast(mode==="confirmBought" ? "✅ Compra guardada y lista vaciada" : "🧾 Lista guardada");
      openHistory();
      render();
    });
  }

  // ---------- History ----------
  function fmtDate(iso){
    try{
      const d=new Date(iso);
      return d.toLocaleString("es-ES",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    }catch{ return iso; }
  }

  function openHistory(){
    if((state.purchases||[]).length===0){
      openModal("📚 Historial", `<p style="margin:0;font-weight:1000;font-size:18px;">No hay compras guardadas todavía.</p>`, `

  function similarityScore(a, b){
    if(!a || !b) return 0;
    if(a === b) return 100;
    let score = 0;
    if(b.includes(a) || a.includes(b)) score += 40;

    const ta = new Set(a.split(" ").filter(Boolean));
    const tb = new Set(b.split(" ").filter(Boolean));
    let common = 0;
    ta.forEach(t => { if(tb.has(t)) common++; });
    score += common * 18;

    if(b.startsWith(a) || a.startsWith(b)) score += 15;
    return score;
  }

  function openConvertNote(note){
    const transcript = norm(note.text);
    const all = allProductsFlat().map(x => ({ id: x.product.id, name: x.product.name, cat: x.category.name }));
    const scored = all.map(p => ({...p, score: similarityScore(transcript, norm(p.name))}))
                     .sort((a,b)=>b.score-a.score)
                     .slice(0, 12);

    let html = `
      <div class="adminCard">
        <div style="font-weight:1000;font-size:18px;">Convertir nota</div>
        <div class="muted">Nota: <b>${escapeHtml(note.text)}</b> (x${Number(note.qty)||1})</div>
        <div class="muted" style="margin-top:6px;">Elige el producto correcto:</div>
      </div>
    `;

    for(const s of scored){
      html += `
        <div class="rowItem">
          <div class="rowName">${escapeHtml(s.name)} <span class="muted">(${escapeHtml(s.cat)})</span></div>
          <div class="rowControls">

      `;
    }

    openModal("📝 Elegir producto", html, `

    `);

        addToList(pid, Number(note.qty)||1);

    function getFilteredProducts(){
      const q = norm(searchEl?.value || "");
      const catId = filterCat?.value || "__ALL__";

      const all = allProductsFlat().map(x=>({
        catId: x.category.id,
        catName: x.category.name,
        productId: x.product.id,
        name: x.product.name,
        icon: x.product.icon || "",
        price: Number(x.product.price)||0,
        important: !!x.product.important
      }));

      return all.filter(p=>{
        const okCat = (catId==="__ALL__") ? true : (p.catId===catId);
        const okQ = !q ? true : norm(p.name).includes(q);
        return okCat && okQ;

    let draggingId = null;

    function renderOrderList(){
      listEl.innerHTML = "";
      for(const pid of state.globalOrder){
        const found = findProduct(pid);
        if(!found) continue;

        const row = document.createElement("div");
        row.className = "rowItem";
        row.setAttribute("data-pid", pid);
        row.setAttribute("draggable", "true");

        const emoji = (found.item.icon||"").trim();

        row.innerHTML = `
          <div class="dragRow">
            <div class="dragHandle" title="Arrastrar">☰</div>
            <div class="dragMeta">
              <div class="dragName">${escapeHtml(emoji)} ${escapeHtml(found.item.name)}</div>
              <div class="dragCat">${escapeHtml(found.category.name)}</div>
            </div>
          </div>
        `;

        row.addEventListener("dragstart", (e)=>{
          draggingId = pid;
          e.dataTransfer.effectAllowed = "move";
          try{ e.dataTransfer.setData("text/plain", pid); }catch{}
          row.style.opacity = "0.6";
        });

        row.addEventListener("dragend", ()=>{
          draggingId = null;
          row.style.opacity = "1";
          listEl.querySelectorAll(".dragOver").forEach(x=>x.classList.remove("dragOver"));
        });

        row.addEventListener("dragover", (e)=>{
          e.preventDefault();
          row.classList.add("dragOver");
          e.dataTransfer.dropEffect = "move";
        });

        row.addEventListener("dragleave", ()=>{
          row.classList.remove("dragOver");
        });

        row.addEventListener("drop", (e)=>{
          e.preventDefault();
          row.classList.remove("dragOver");

          const fromId = draggingId || (()=>{
            try{ return e.dataTransfer.getData("text/plain"); }catch{ return null; }
          })();
          const toId = pid;

          if(!fromId || fromId === toId) return;

          const arr = [...state.globalOrder];
          const fromIdx = arr.indexOf(fromId);
          const toIdx = arr.indexOf(toId);
          if(fromIdx === -1 || toIdx === -1) return;

          arr.splice(fromIdx, 1);
          arr.splice(toIdx, 0, fromId);

          state.globalOrder = arr;
          renderOrderList();
        });

        listEl.appendChild(row);
      }
    }

  // ======= PARSER DE CANTIDADES + MULTI PRODUCTO =======
  const NUM_WORDS = new Map([
    ["un",1],["una",1],["uno",1],
    ["dos",2],["tres",3],["cuatro",4],["cinco",5],
    ["seis",6],["siete",7],["ocho",8],["nueve",9],["diez",10],
    ["once",11],["doce",12]
  ]);

  function extractQtyAndName(partRaw){
    let s = norm(partRaw);
    s = s.replace(/\b(anade|añade|pon|mete|agrega|comprar|compra|necesito|quiero|por favor)\b/g, " ").replace(/\s+/g," ").trim();

    let m = s.match(/\bx\s*(\d{1,2})\b/);
    if(m){
      const qty = clampQty(Number(m[1]));
      s = s.replace(m[0], " ").replace(/\s+/g," ").trim();
      return { qty, name: s };
    }

    m = s.match(/^(\d{1,2})\s+(.*)$/);
    if(m){
      const qty = clampQty(Number(m[1]));
      return { qty, name: m[2].trim() };
    }

    m = s.match(/^([a-zñ]+)\s+(.*)$/);
    if(m && NUM_WORDS.has(m[1])){
      const qty = clampQty(NUM_WORDS.get(m[1]));
      return { qty, name: m[2].trim() };
    }

    return { qty: 1, name: s };
  }

  function clampQty(n){
    const x = Number(n)||1;
    return Math.max(1, Math.min(20, x));
  }

  function splitIntoParts(transcript){
    let t = String(transcript||"").trim();
    if(!t) return [];
    t = t.replace(/ y /gi, ", ");
    t = t.replace(/ más /gi, ", ");
    t = t.replace(/ tambien /gi, ", ");
    t = t.replace(/ también /gi, ", ");
    t = t.replace(/ con /gi, ", ");
    t = t.replace(/;/g, ",");
    return t.split(",").map(x=>x.trim()).filter(Boolean);
  }

  // Regla AMAMA: huevos/docena/12 huevos => producto Huevos 12
  function wantsEggPack12(nameNorm){
    const hasEgg = /\bhuevo(s)?\b/.test(nameNorm);
    return !!hasEgg;
  }
  function computeEggPackQty(partNorm){
    if(/\bdocena(s)?\b/.test(partNorm)){
      const m = partNorm.match(/\b(\d{1,2})\s+docena/);
      if(m) return clampQty(Number(m[1]));
      const mw = partNorm.match(/\b([a-zñ]+)\s+docena/);
      if(mw && NUM_WORDS.has(mw[1])) return clampQty(NUM_WORDS.get(mw[1]));
      return 1;
    }
    if(/\b(12|doce)\s+huevo/.test(partNorm)) return 1;
    return 1;
  }

  function findProductByNameCanonical(canonicalName){
    const target = norm(canonicalName);
    const all = allProductsFlat();
    for(const x of all){
      if(norm(x.product.name) === target) return x.product.id;
    }
    return null;
  }

  function bestMatchProductId(queryNorm){
    const products = allProductsFlat().map(x => ({
      id: x.product.id,
      name: x.product.name,
      nname: norm(x.product.name),
      cat: x.category.name
    }));

    const scored = products.map(p => ({
      ...p,
      score: similarityScore(queryNorm, p.nname)
    })).sort((a,b)=>b.score-a.score);

    return { best: scored[0], second: scored[1], scored };
  }

  function matchThresholdOK(best, second){
    if(!best) return { ok:false, ambiguous:false };
    const strong = best.score >= 58;
    const ambiguous = strong && second && (best.score - second.score) < 12 && second.score >= 48;
    if(!strong) return { ok:false, ambiguous:false };
    if(ambiguous) return { ok:true, ambiguous:true };
    return { ok:true, ambiguous:false };
  }

  function handleTranscriptMulti(transcriptRaw){
    const raw = String(transcriptRaw||"").trim();
    if(!raw){
      showToast("⚠️ No entendido");
      closeModal();
      return;
    }

    const parts = splitIntoParts(raw);

    const recognized = [];
    const unrecognized = [];

    for(const part of parts){
      const { qty, name } = extractQtyAndName(part);
      const nameNorm = norm(name);
      if(!nameNorm) continue;

      if(wantsEggPack12(nameNorm)){
        const packName = "Huevos 12";
        const packQty = computeEggPackQty(norm(part));
        const pid = findProductByNameCanonical(packName);
        if(pid){
          recognized.push({ kind:"product", productId: pid, label: packName, qty: packQty, noteText: null });
        }else{
          unrecognized.push({ kind:"note", rawText: packName, qty: packQty, createNote: true });
        }
        continue;
      }

      const { best, second } = bestMatchProductId(nameNorm);
      const th = matchThresholdOK(best, second);

      if(th.ok){
        recognized.push({
          kind:"product",
          productId: best.id,
          label: best.name + (th.ambiguous ? " (¿?)" : ""),
          qty: qty,
          noteText: null,
          ambiguous: th.ambiguous
        });
      }else{
        unrecognized.push({
          kind:"note",
          rawText: part.trim(),
          qty: qty,
          createNote: true
        });
      }
    }

    if(recognized.length===0 && unrecognized.length===0){
      openModal("🎤 Voz", `
        <div class="voiceBox">
          <p class="voiceBig">No he detectado productos.</p>
          <div class="voiceSub">Prueba diciendo: “leche, pan, yogur”.</div>
        </div>
      `, `
        <button class="action secondary" id="btnRetryVoice">🎤 Reintentar</button>
        <button class="action secondary" id="btnCloseVoice">Cerrar</button>
      `);
      modalFoot.querySelector("#btnRetryVoice")?.addEventListener("click", openVoice);
      modalFoot.querySelector("#btnCloseVoice")?.addEventListener("click", closeModal);
      return;
    }

    openVoiceConfirm(raw, recognized, unrecognized);
  }

  function openVoiceConfirm(transcriptRaw, recognizedInit, unrecognizedInit){
    let rec = recognizedInit.map(x=>({ ...x, keep:true }));
    let unr = unrecognizedInit.map(x=>({ ...x }));

    function renderConfirm(){
      let html = `
        <div class="voiceBox">
          <p class="voiceBig">¿Añadir estos productos?</p>
          <div class="voiceSub">He entendido: “${escapeHtml(transcriptRaw)}”</div>
        </div>
      `;

      if(rec.length>0){
        html += `<div class="adminCard"><div style="font-weight:1000;font-size:18px;">✅ Reconocidos</div><div class="muted">Puedes quitar alguno antes de añadir.</div></div>`;
        rec.forEach((it, idx)=>{
          if(!it.keep) return;
          html += `
            <div class="rowItem">
              <div class="rowName">${escapeHtml(it.label)} <span class="muted">x${it.qty}</span></div>
              <div class="rowControls">
                <button class="mini danger" data-rm="${idx}">Quitar</button>
              </div>
            </div>
          `;
        });
      }

      if(unr.length>0){
        html += `<div class="adminCard"><div style="font-weight:1000;font-size:18px;">📝 No reconocidos</div><div class="muted">Se crearán como notas (por defecto).</div></div>`;
        unr.forEach((it, idx)=>{
          html += `
            <div class="rowItem">
              <div class="rowName">${escapeHtml(it.rawText)} <span class="muted">x${it.qty}</span></div>
              <div class="rowControls">
                <button class="mini" data-tgl="${idx}">${it.createNote ? "Nota: Sí" : "Nota: No"}</button>
              </div>
            </div>
          `;
        });
      }

      const canAdd = rec.some(x=>x.keep) || unr.some(x=>x.createNote);

      openModal("🎤 Confirmar", html, `
        <button class="action secondary" id="btnCancelConfirm">❌ Cancelar</button>
        <button class="action" id="btnAddConfirm" ${canAdd ? "" : "disabled"}>✅ Añadir</button>
        <button class="action secondary" id="btnRetryConfirm">🎤 Reintentar</button>
      `);

      modalBody.querySelectorAll("button[data-rm]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const idx = Number(btn.getAttribute("data-rm"));
          if(Number.isFinite(idx) && rec[idx]) rec[idx].keep = false;
          renderConfirm();
        });
      });

      modalBody.querySelectorAll("button[data-tgl]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const idx = Number(btn.getAttribute("data-tgl"));
          if(Number.isFinite(idx) && unr[idx]) unr[idx].createNote = !unr[idx].createNote;
          renderConfirm();
        });
      });

      modalFoot.querySelector("#btnCancelConfirm")?.addEventListener("click", closeModal);
      modalFoot.querySelector("#btnRetryConfirm")?.addEventListener("click", openVoice);

      modalFoot.querySelector("#btnAddConfirm")?.addEventListener("click", ()=>{
        let addedCount = 0;

        for(const it of rec){
          if(!it.keep) continue;
          const pid = it.productId;
          const q = Number(it.qty)||1;
          const current = Number(state.list[pid]||0);
          state.list[pid] = current + q;
          addedCount += 1;
        }

        let notesMade = 0;
        for(const it of unr){
          if(!it.createNote) continue;
          addNote(it.rawText, it.qty);
          notesMade += 1;
        }

        saveState();
        softBeep();
        render();
        updateListPill();

        if(notesMade>0 && addedCount>0) showToast(`✅ Añadidos + 📝 Notas`);
        else if(notesMade>0) showToast(`📝 Nota(s) creada(s)`);
        else showToast(`✅ Añadido(s)`);

        closeModal();
        if(notesMade>0) openList();
      });
    }

    renderConfirm();
  }

  // ---------- Events ----------
  btnBack.addEventListener("click", ()=>{ view={screen:"home",categoryId:null}; render(); });
  btnOpenList.addEventListener("click", openList);

  btnAdmin.addEventListener("click", () => {
    if (isModalOpen()) { closeModal(); return; }
    openAdmin();
  });

  btnHome?.addEventListener("click", () => {
    closeModal();
    view = { screen: "home", categoryId: null };
    render();
  });

  btnVoice.addEventListener("click", () => {
    if (isModalOpen()) { closeModal(); return; }
    openVoice();
  });

})();
  </script>

  <script>
    // PWA
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
